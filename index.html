<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ホールデータまとめ</title>
    <!-- CSS読み込み -->
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/daily.css">
    <link rel="stylesheet" href="css/analysis.css">
    <link rel="stylesheet" href="css/calendar.css">
    <link rel="stylesheet" href="css/island.css">
    <link rel="stylesheet" href="css/machinebadge.css">
    <link rel="stylesheet" href="css/aim.css">
    <link rel="stylesheet" href="css/memo.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>
    <!-- ローディング画面 -->
    <div id="loading-screen" class="loading-screen">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <div class="loading-text">データを読み込み中...</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
            <div class="loading-status" id="loadingStatus">初期化中...</div>
        </div>
    </div>
    
    <h1>📊 ホールデータまとめ</h1>

    <!-- =================== -->
    <!-- ホーム（ターミナル）  -->
    <!-- =================== -->
    <div id="home" class="tab-content">
        <div class="terminal-home">
            <p class="terminal-lead">表示する内容を選んでください</p>
            <div class="terminal-menu">
                <button class="terminal-card" data-nav="daily">
                    <span class="terminal-card-icon">📅</span>
                    <span class="terminal-card-title">日別データ</span>
                    <span class="terminal-card-desc">日ごとの台データ・フィルター・タグ</span>
                </button>
                <button class="terminal-card" data-nav="memo">
                    <span class="terminal-card-icon">📝</span>
                    <span class="terminal-card-title">メモ</span>
                    <span class="terminal-card-desc">着席メモの記録・共有</span>
                </button>
                <button class="terminal-card" data-nav="analysis">
                    <span class="terminal-card-icon">📈</span>
                    <span class="terminal-card-title">解析</span>
                    <span class="terminal-card-desc">期間推移・トレンドグラフ</span>
                </button>
                <button class="terminal-card" data-nav="calendar">
                    <span class="terminal-card-icon">🗓️</span>
                    <span class="terminal-card-title">カレンダー</span>
                    <span class="terminal-card-desc">月間の差枚・勝率カレンダー</span>
                </button>
                <button class="terminal-card" data-nav="island">
                    <span class="terminal-card-icon">🗺️</span>
                    <span class="terminal-card-title">ヒートマップ</span>
                    <span class="terminal-card-desc">島図レイアウトで視覚化</span>
                </button>
            </div>
        </div>
    </div>

    <!-- =================== -->
    <!-- 日別データタブ（中身は partials/daily.html から動的挿入） -->
    <!-- =================== -->
    <div id="daily" class="tab-content" data-partial="partials/daily.html">
        <!-- 中身は partials/daily.html から fetch して挿入される -->
    </div>

    <!-- メモタブ（中身は partials/memo.html から動的挿入） -->
    <div id="memo" class="tab-content" data-partial="partials/memo.html"></div>

    <!-- 解析タブ（中身は partials/analysis.html から動的挿入） -->
    <div id="analysis" class="tab-content" data-partial="partials/analysis.html"></div>

    <!-- カレンダータブ（中身は partials/calendar.html から動的挿入） -->
    <div id="calendar" class="tab-content" data-partial="partials/calendar.html"></div>


    <!-- 島図タブ（中身は partials/island.html から動的挿入） -->
    <div id="island" class="tab-content" data-partial="partials/island.html"></div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/data.js"></script>
    <script src="js/chart.js"></script>
    <script src="js/preset.js"></script>
    <script src="js/hstag.js"></script>
    <script src="js/machinebadge.js"></script>
    <script src="js/daily-state.js"></script>
    <script src="js/daily.js"></script>
    <script src="js/aim.js"></script>
    <script src="js/memo.js"></script>
    <script src="js/analysis.js"></script>
    <script src="js/calendar.js"></script>
    <script src="js/island.js"></script>
    <script src="js/router.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
