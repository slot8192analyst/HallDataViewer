<button class="back-to-home" data-nav="home">← ホーム</button>
<div class="island-header">
    <h2>📝 着席メモ</h2>
    <p class="island-description">「誰が座っていたか」「設定がどれだったか」を台ごとに記録して仲間内で共有します</p>
</div>

<div class="memo-input-panel">
    <div class="memo-input-row">
        <label class="memo-field-label">記録者</label>
        <input type="text" id="memoAuthorInput" placeholder="あなたの名前" maxlength="20">
    </div>

    <div class="memo-input-row memo-wheel-row">
        <label class="memo-field-label">日付</label>
        <div class="memo-wheel" id="memoDateWheel"></div>
    </div>

    <div class="memo-input-row">
        <label class="memo-field-label">台を選択</label>
        <select id="memoMachineSelect"><option value="">機種を選択...</option></select>
        <select id="memoUnitSelect"><option value="">台番号を選択...</option></select>
        <span class="memo-or-sep">または直接入力 →</span>
        <input type="text" id="memoUnitDirect" placeholder="台番号">
    </div>

    <div class="memo-input-row">
        <label class="memo-field-label">誰が</label>
        <input type="text" id="memoPersonInput" placeholder="例: 常連の○○さん（空欄可）">
    </div>

    <div class="memo-input-row">
        <label class="memo-field-label">設定</label>
        <div class="memo-setting-checks" id="memoSettingChecks"></div>
    </div>

    <div class="memo-input-actions">
        <button class="btn-apply" id="memoSubmitBtn">💾 メモを保存</button>
        <button class="btn-reset" id="memoClearBtn">↺ 入力クリア</button>
    </div>
</div>

<div id="memoList"></div>
